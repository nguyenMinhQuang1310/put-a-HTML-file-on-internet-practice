<!DOCTYPE html>
<html>
  <head>
    <title>position practice</title>
  </head>

  <body style="
   height: 3000px;
   padding-top: 50px;
   padding-left: 72px;
  ">

    <a href="." style="padding-bottom: 10px; display: block;">Link to Homepage</a>

    <div style="
      background-color: black;
      color: white;
      position: fixed;
      top: 0px;
      left: 0px;
      right: 0px;
      height: 50px;
      z-index: 100;
    ">Header</div>

    <div style="
      background-color: green;
      color: white;
      position: fixed;
      top: 49px;
      left: 0px;
      bottom: 0px;
      width: 72px;
    ">
      Sidebar

      <div style="
      position: absolute;
      background-color: red;
      color: white;
      top: 0px;
      right: 0px;
      ">
        X
      </div>

    </div>

    <div style="
      position: absolute;
      background-color: red;
      color: white;
      top: 60px;
      right: 10px;
    ">absolute</div>

    <div style="
      background-color: lightblue;
      width: 200px;
      height: 200px;
      position: static;
    ">div 1</div>
    <div style="
      background-color: lightpink;
      width: 200px;
      height: 200px;
      position: relative;
    ">
      div 2
      <div style="
      position: absolute;
      background-color: black;
      color: white;
      bottom: 10px;
      right: 10px;
      ">
        5:00
      </div>
    </div>
  </body>
</html>
